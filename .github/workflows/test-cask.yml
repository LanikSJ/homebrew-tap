name: Test Homebrew Cask

on:
  pull_request:
    branches: [ main ]
    paths:
      - "Casks/**"
  workflow_dispatch:

env:
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1

jobs:
  test-cask:
    name: Test Homebrew Cask
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main # latest

      - name: Test cask installation
        run: |
          # Test each cask in the Casks directory
          for cask in Casks/*.rb; do
            echo "Testing cask: $cask"
            # Extract cask name from file path
            cask_name=$(basename "$cask" .rb)
            
            # Install the cask
            brew install --cask "laniksj/tap/$cask_name" || {
              echo "Failed to install $cask_name"
              exit 1
            }
            
            # Test the cask
            brew test "$cask_name" || {
              echo "Failed to test $cask_name"
              exit 1
            }
            
            # Uninstall the cask
            brew uninstall "$cask_name"
          done

      - name: Test cask syntax
        run: |
          # Check cask syntax
          for cask in Casks/*.rb; do
            echo "Checking syntax for: $cask"
            ruby -c "$cask" || {
              echo "Syntax error in $cask"
              exit 1
            }
          done

  validate-cask:
    name: Validate Cask
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main # latest

      - name: Validate cask with brew audit
        run: |
          # Run brew audit on all casks
          for cask in Casks/*.rb; do
            echo "Auditing cask: $cask"
            cask_name=$(basename "$cask" .rb)
            brew audit --new --cask "$cask_name" || {
              echo "Audit failed for $cask"
              exit 1
            }
          done
