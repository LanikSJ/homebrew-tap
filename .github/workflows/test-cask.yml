name: Test Homebrew Cask

on:
  pull_request:
    branches: [ main ]
    paths:
      - "Casks/**"
  workflow_dispatch:

env:
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1

jobs:
  test-cask:
    name: Test Homebrew Cask
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main # latest

      - name: Test Cask Installation
        run: |
          # Test Each Cask in Casks Directory
          for cask in Casks/*.rb; do
            echo "Testing Cask: $cask"
            # Extract Cask Name from File Path
            cask_name=$(basename "$cask" .rb)
            
            # Install Cask
            brew install --cask "laniksj/tap/$cask_name" || {
              echo "Failed to install $cask_name"
              exit 1
            }
            
            # Uninstall Cask
            brew uninstall "laniksj/tap/$cask_name" || {
              echo "Failed to uninstall $cask_name"
              exit 1
            }
          done

      - name: Test Cask Syntax
        run: |
          # Check Cask Syntax
          for cask in Casks/*.rb; do
            echo "Checking syntax for: $cask"
            ruby -c "$cask" || {
              echo "Syntax error in $cask"
              exit 1
            }
          done

  validate-cask:
    name: Validate Cask
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main # latest

      - name: Validate Cask with Brew Audit
        run: |
          # Run Brew Audit on All Casks
          for cask in Casks/*.rb; do
            echo "Auditing Cask: $cask"
            cask_name=$(basename "$cask" .rb)
            brew audit --cask "$cask_name" || {
              echo "Audit failed for $cask"
              exit 1
            }
          done
