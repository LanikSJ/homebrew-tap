name: Bump Casks

on:
  schedule:
    # Time is UTC, so below is running everyday at 4AM and 4PM PST
    - cron: "0 4,16 * * *"
  push:
    paths:
      - ".github/workflows/bump-casks.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-casks:
    name: Bump Homebrew Cask
    runs-on: macos-latest
    steps:
      - name: Homebrew Bump Cask (LanikSJ)
        uses: LanikSJ/homebrew-bump-cask@39b936ccc3814f377d18b979f82640eafaacbe32 # v2
        with:
          # Authentication token to use for pushing changes; use the built-in GITHUB_TOKEN or define a HOMEBREW_TOKEN secret
          token: ${{ secrets.HOMEBREW_TOKEN }}
          user_name: ${{ github.actor }}
          user_email: ${{ github.actor }}@users.noreply.github.com
          # Bump all outdated casks in this tap
          tap: laniksj/homebrew-tap
          # Bump only these casks if outdated
          cask: android-messages-plus
          livecheck: true
          dryrun: false
